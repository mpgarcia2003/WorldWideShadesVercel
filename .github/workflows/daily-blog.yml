name: Daily Blog Post

on:
  schedule:
    # Runs every day at 12:00 UTC (7am EST / 8am EDT)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Check for new post
        id: check
        run: |
          if git diff --quiet content/blog/ public/images/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "WWS Blog Bot"
          git config user.email "blog-bot@worldwideshades.com"
          git add content/blog/ public/images/
          git commit -m "Auto-publish daily blog post $(date +%Y-%m-%d)"
          git push
